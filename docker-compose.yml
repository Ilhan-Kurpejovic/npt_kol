version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: mysql_books1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: books1_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build: .
    container_name: flask_books_app1
    restart: always
    depends_on:
      - db
    ports:
      - "5000:5000"
    environment:
      DB_USER: root
      DB_PASSWORD: root
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: books1_db

volumes:
  mysql_data:
